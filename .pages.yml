content:
    - name: quiz_files
      label: All Quiz Files
      type: collection
      path: app/public/quiz
      extension: json
      format: json
      fields:
          - type: object
            name: ""
            label: Chapter info
            fields:
                - name: chapter
                  label: Chapter (Number)
                  type: number

                - name: vocabulary
                  label: 単語・クイズリスト
                  type: object
                  fields:
                      - name: id
                        label: ID (UUIDなど)
                        type: string
                      - name: expression
                        label: Question
                        type: string

                      - name: definitions
                        label: Answer
                        type: text
